services:
  - type: web
    name: gabriel-audio-study
    env: docker
    plan: starter
    autoDeploy: false
    disk:
      name: audio-study-storage
      mountPath: /app/server/storage
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: APP_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://gabriel-audio-study.onrender.com
      - key: TTS_PROVIDER_ORDER
        value: azure,polly,elevenlabs,openai
      - key: AWS_POLLY_ACCESS_KEY_IDS
        sync: false
      - key: AWS_POLLY_SECRET_ACCESS_KEYS
        sync: false
      - key: AWS_POLLY_REGIONS
        value: us-east-1
      - key: AWS_POLLY_VOICES
        value: Camila
      - key: AWS_POLLY_ENGINE
        value: generative
      - key: AWS_POLLY_OUTPUT_FORMAT
        value: mp3
      - key: AWS_POLLY_SAMPLE_RATE
        value: 24000
      - key: ELEVENLABS_API_KEYS
        sync: false
      - key: ELEVENLABS_VOICE_IDS
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
      - key: ELEVENLABS_OUTPUT_FORMAT
        value: mp3_44100_128
      - key: OPENAI_API_KEYS
        sync: false
      - key: TTS_MODEL
        value: gpt-4o-mini-tts
      - key: TTS_VOICE
        value: marin
